<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.6.0/default/snipcart.css" />
  <script async src="https://cdn.snipcart.com/themes/v3.6.0/default/snipcart.js"></script>
</head>
<body>
  

  <section class="grid" id="catalog">
  
    
  
    
    <article class="product-card">
      <a href="/products/meatman/">
        <img src="/images/blog/refundbanner.png" alt="meater" loading="lazy" />
      </a>
      <h3><a href="/products/meatman/">meater</a></h3>
      <p class="price">$10</p>
      <p class="desc">best meat</p>

      <button
        type="button"
        class="snipcart-add-item"
        data-item-id="meatman"
        data-item-name="meater"
        data-item-price="10"
        data-item-url="/products/meatman/"
        data-item-image="/images/blog/refundbanner.png"
        data-item-description="best meat"
        >
        Add to cart
      </button>
    </article>
    
  
    
    <article class="product-card">
      <a href="/products/cheesefinal/">
        <img src="/images/blog/refundbanner.png" alt="The Final Cheese" loading="lazy" />
      </a>
      <h3><a href="/products/cheesefinal/">The Final Cheese</a></h3>
      <p class="price">$15</p>
      <p class="desc">Ouu weee I think its time we bend the block again</p>

      <button
        type="button"
        class="snipcart-add-item"
        data-item-id="cheesefinal"
        data-item-name="The Final Cheese"
        data-item-price="15"
        data-item-url="/products/cheesefinal/"
        data-item-image="/images/blog/refundbanner.png"
        data-item-description="Ouu weee I think its time we bend the block again"
        >
        Add to cart
      </button>
    </article>
    
  
    
    <article class="product-card">
      <a href="/products/cheese2/">
        <img src="/images/blog/refundbanner.png" alt="Cheesier Cheese" loading="lazy" />
      </a>
      <h3><a href="/products/cheese2/">Cheesier Cheese</a></h3>
      <p class="price">$10</p>
      <p class="desc">this is the cheese</p>

      <button
        type="button"
        class="snipcart-add-item"
        data-item-id="cheese2"
        data-item-name="Cheesier Cheese"
        data-item-price="10"
        data-item-url="/products/cheese2/"
        data-item-image="/images/blog/refundbanner.png"
        data-item-description="this is the cheese"
        >
        Add to cart
      </button>
    </article>
    
  
    
    <article class="product-card">
      <a href="/products/213asd/">
        <img src="/images/blog/refundbanner.png" alt="Cheese" loading="lazy" />
      </a>
      <h3><a href="/products/213asd/">Cheese</a></h3>
      <p class="price">$10</p>
      <p class="desc">best cheese</p>

      <button
        type="button"
        class="snipcart-add-item"
        data-item-id="213asd"
        data-item-name="Cheese"
        data-item-price="10"
        data-item-url="/products/213asd/"
        data-item-image="/images/blog/refundbanner.png"
        data-item-description="best cheese"
        >
        Add to cart
      </button>
    </article>
    
  
</section>


  

  <div id="snipcart" hidden
       data-api-key="YOUR_PUBLIC_API_KEY"
       data-config-add-product-behavior="none"></div>
</body>
</html>
